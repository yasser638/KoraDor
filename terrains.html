<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korador — Carte des terrains</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

  <div class="site-layout">

    <nav class="navbar">
      <div class="brand">
        <span class="logo-ball"></span>
        <h2>Kora<span class="accent">dor</span></h2>
      </div>
      <div class="nav-menu">
        <ul class="nav-links">
          <li><a href="index.html">Accueil</a></li>
          <li><a href="terrains.html" class="active">Terrains</a></li>
          <li><a href="About.html">À propos</a></li>
          <li><a href="Contact.html">Contact</a></li>
        </ul>
        <button class="btn-login">Se connecter</button>
      </div>
    </nav>

    <main>
      <div style="padding:40px 0 8px;">
        <span class="kd-eyebrow">Carte</span>
        <h1 class="kd-slider-title">Où se trouvent nos terrains</h1>
        <p style="color:var(--text-soft); margin-top:8px; max-width:560px;">Clique sur un point pour voir le détail du terrain et son prix.</p>
      </div>

      <div class="kd-map-search-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="kd-map-search" class="kd-map-search-input" placeholder="Chercher un terrain (nom ou quartier)...">
      </div>
      <p id="kd-map-search-msg" class="kd-map-search-msg" hidden></p>

      <div id="kd-map" style="height:480px; border-radius:16px; margin:16px 0 50px; border:1px solid var(--green-line);"></div>

    </main>

    <footer class="footer">
      <p class="copyright">© 2026 Korador. Tous droits réservés.</p>
      <div class="kd-social">
        <a href="#" aria-label="Instagram" class="insta-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1"></circle></svg>
        </a>
        <a href="#" aria-label="TikTok" class="insta-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg>
        </a>
        <a href="#" aria-label="WhatsApp" class="insta-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 0 1-12.8 7.3L3 20l1.3-5A8.5 8.5 0 1 1 21 11.5z"></path></svg>
        </a>
      </div>
    </footer>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="terrains-map.js"></script>

</body>
</html>
